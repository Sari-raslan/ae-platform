name: KeyboardManagerCI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend install
        run: |
          cd frontend
          npm install

      - name: Frontend build
        run: |
          cd frontend
          npm run build

      - name: Backend install
        run: |
          cd backend
          npm install

      - name: Smoke test
        run: |
          cd backend
          npm run smoke
